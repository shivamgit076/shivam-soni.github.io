    function useInView() {
      const ref = useRef(null);
      const [v, setV] = useState(false);
      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setV(true); obs.disconnect(); } }, { threshold: 0.1 });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return [ref, v];
    }

    function FadeUp({ children, delay = 0, className = "" }) {
      const [ref, v] = useInView();
      return (
        <div ref={ref} className={className} style={{ opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(26px)", transition: `opacity .5s ${delay}s ease, transform .5s ${delay}s ease` }}>

      );

    /* ── AI Neural Network Animation ── */
    function NeuralNetwork() {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let animId;
        const dpr = window.devicePixelRatio || 1;
        const resize = () => {
          const rect = canvas.parentElement.getBoundingClientRect();
          canvas.width = rect.width * dpr;
          canvas.height = rect.height * dpr;
          canvas.style.width = rect.width + 'px';
          canvas.style.height = rect.height + 'px';
          ctx.scale(dpr, dpr);
        };
        resize();
        window.addEventListener('resize', resize);

        const W = () => canvas.width / dpr;
        const H = () => canvas.height / dpr;

        // Neural network nodes in 4 layers
        const layers = [3, 5, 5, 3];
        const getNodes = () => {
          const nodes = [];
          const w = W(), h = H();
          const layerGap = w / (layers.length + 1);
          layers.forEach((count, li) => {
            const x = layerGap * (li + 1);
            const gap = h / (count + 1);
            for (let i = 0; i < count; i++) {
              nodes.push({ x, y: gap * (i + 1), layer: li, r: li === 0 || li === layers.length - 1 ? 5 : 4 });
            }
          });
          return nodes;
        };

        // Particles flowing along connections
        const particles = [];
        const spawnParticle = (nodes) => {
          if (particles.length > 15) return;
          const srcLayer = Math.floor(Math.random() * (layers.length - 1));
          const srcNodes = nodes.filter(n => n.layer === srcLayer);
          const dstNodes = nodes.filter(n => n.layer === srcLayer + 1);
          if (!srcNodes.length || !dstNodes.length) return;
          const src = srcNodes[Math.floor(Math.random() * srcNodes.length)];
          const dst = dstNodes[Math.floor(Math.random() * dstNodes.length)];
          particles.push({ sx: src.x, sy: src.y, dx: dst.x, dy: dst.y, t: 0, speed: 0.008 + Math.random() * 0.012 });
        };

        let t = 0;
        const draw = () => {
          t++;
          const w = W(), h = H();
          ctx.clearRect(0, 0, w, h);
          const nodes = getNodes();

          // Draw connections
          for (let li = 0; li < layers.length - 1; li++) {
            const src = nodes.filter(n => n.layer === li);
            const dst = nodes.filter(n => n.layer === li + 1);
            src.forEach(s => {
              dst.forEach(d => {
                const grad = ctx.createLinearGradient(s.x, s.y, d.x, d.y);
                grad.addColorStop(0, 'rgba(139,92,246,0.08)');
                grad.addColorStop(1, 'rgba(20,184,166,0.08)');
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(d.x, d.y);
                ctx.strokeStyle = grad;
                ctx.lineWidth = 0.8;
                ctx.stroke();
              });
            });
          }

          // Draw nodes
          nodes.forEach((n, i) => {
            const pulse = Math.sin(t * 0.03 + i * 0.5) * 0.3 + 0.7;
            const isInput = n.layer === 0;
            const isOutput = n.layer === layers.length - 1;
            // Glow
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.r * 3, 0, Math.PI * 2);
            const glowColor = isInput ? `rgba(20,184,166,${0.1 * pulse})` : isOutput ? `rgba(139,92,246,${0.15 * pulse})` : `rgba(139,92,246,${0.08 * pulse})`;
            ctx.fillStyle = glowColor;
            ctx.fill();
            // Node
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
            const nodeColor = isInput ? `rgba(20,184,166,${0.6 + 0.3 * pulse})` : isOutput ? `rgba(139,92,246,${0.7 + 0.3 * pulse})` : `rgba(139,92,246,${0.4 + 0.2 * pulse})`;
            ctx.fillStyle = nodeColor;
            ctx.fill();
          });

          // Spawn & draw particles
          if (t % 8 === 0) spawnParticle(nodes);
          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.t += p.speed;
            if (p.t >= 1) { particles.splice(i, 1); continue; }
            const x = p.sx + (p.dx - p.sx) * p.t;
            const y = p.sy + (p.dy - p.sy) * p.t;
            const alpha = Math.sin(p.t * Math.PI);
            ctx.beginPath();
            ctx.arc(x, y, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(139,92,246,${0.8 * alpha})`;
            ctx.fill();
            // Trail
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(20,184,166,${0.2 * alpha})`;
            ctx.fill();
          }

          animId = requestAnimationFrame(draw);
        };
        draw();
        return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
      }, []);

      return <canvas ref={canvasRef} className="absolute inset-0 w-full h-full" style={{ opacity: 0.7 }} />;
    }
